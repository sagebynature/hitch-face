# Hitch Face Configuration

# Enable bouncing window movement triggered by Hitch events (default: false)
movement_enabled = false

# Movement speed multiplier for the bouncing face (default: 1.0)
speed = 1.0

# Bouncing physics refresh interval in milliseconds (default: 100)
interval_ms = 100

# Port for the HTTP server listening for event updates (default: 8888)
port = 8888

# Ticker scroll speed in seconds per cycle — lower is faster (default: 15)
ticker_speed_s = 10

# Maximum number of lines to retain in the console buffer (default: 500)
buffer_size = 500

# Optional OpenAI-compatible event summarizer for ticker text.
[summarizer]
base_url = "http://localhost:9000/v1"
api_key = "omlx"
model = "mlx-community--Qwen3-0.6B-4bit"
prompt = "Summarize under 20 words. Only reply with answer"
temperature = 0.2
max_token = 20

# Custom casing colors for different harnesses
[colors]
default = "#4ca8a1"
omp = "#4ca8a1"
pi = "#4047FF"
hermes = "#e4c160"
opencode = "#B8B1B1"
codex = "#4047FF"
antigravity = "#de8a1d"
