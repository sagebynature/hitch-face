name: Build Packages

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package-command: npm run dist:mac
            artifact-name: hitch-face-macos
            artifact-path: app/zig-out/package/**/*.app
          - os: windows-latest
            package-command: npm run dist:win
            artifact-name: hitch-face-windows
            artifact-path: app/zig-out/package/**/*
          - os: ubuntu-latest
            package-command: npm run dist:linux
            artifact-name: hitch-face-linux
            artifact-path: app/zig-out/package/**/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install Zig
        shell: bash
        run: |
          node <<'NODE'
          (async () => {
          const childProcess = require('node:child_process');
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');

          const version = '0.16.0';
          const platform = {
            darwin: 'macos',
            linux: 'linux',
            win32: 'windows',
          }[process.platform];
          const arch = {
            x64: 'x86_64',
            arm64: 'aarch64',
          }[process.arch];

          if (!platform || !arch) {
            throw new Error(`Unsupported Zig runner target: ${process.platform}-${process.arch}`);
          }

          const target = `${arch}-${platform}`;
          const response = await fetch('https://ziglang.org/download/index.json');
          if (!response.ok) {
            throw new Error(`Failed to fetch Zig download index: ${response.status} ${response.statusText}`);
          }

          const index = await response.json();
          const download = index[version]?.[target];
          if (!download?.tarball) {
            throw new Error(`No Zig ${version} download found for ${target}`);
          }

          const archiveResponse = await fetch(download.tarball);
          if (!archiveResponse.ok) {
            throw new Error(`Failed to download ${download.tarball}: ${archiveResponse.status} ${archiveResponse.statusText}`);
          }

          const archiveBuffer = Buffer.from(await archiveResponse.arrayBuffer());
          const actualSha = crypto.createHash('sha256').update(archiveBuffer).digest('hex');
          if (download.shasum && actualSha !== download.shasum) {
            throw new Error(`Zig archive checksum mismatch: expected ${download.shasum}, got ${actualSha}`);
          }

          const archivePath = path.join(os.tmpdir(), path.basename(new URL(download.tarball).pathname));
          const extractDir = path.join(os.tmpdir(), `zig-${version}`);
          fs.writeFileSync(archivePath, archiveBuffer);
          fs.rmSync(extractDir, { recursive: true, force: true });
          fs.mkdirSync(extractDir, { recursive: true });
          childProcess.execFileSync('tar', ['-xf', archivePath, '-C', extractDir], { stdio: 'inherit' });

          const [zigDirName] = fs.readdirSync(extractDir);
          if (!zigDirName) {
            throw new Error(`Zig archive ${archivePath} did not extract a root directory`);
          }

          const zigDir = path.join(extractDir, zigDirName);
          fs.appendFileSync(process.env.GITHUB_PATH, `${zigDir}${os.EOL}`);
          console.log(`Installed Zig ${version} for ${target} at ${zigDir}`);
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify Zig
        run: zig version

      - name: Install Linux system WebView dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build package
        run: ${{ matrix.package-command }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null || gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-artifacts/* --clobber
